<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Orbit</title>
  <style>
    :root {
      --bg-top: #f7f1e8;
      --bg-bottom: #ddeaf5;
      --ink: #1f2430;
      --muted: #5b6474;
      --paper: rgba(255, 255, 255, 0.78);
      --line: #c8d0dc;
      --brand: #0f766e;
      --brand-dark: #0d5f58;
      --danger: #b42318;
      --chip: #e8f3f1;
      --done: #4f46e5;
      --todo: #a16207;
      --shadow: 0 18px 60px rgba(17, 24, 39, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.75), transparent 30%),
        radial-gradient(circle at 86% 82%, rgba(15, 118, 110, 0.12), transparent 28%),
        linear-gradient(165deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app-shell {
      width: min(980px, 100%);
      background: var(--paper);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(200, 208, 220, 0.85);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: rise 420ms ease-out;
    }

    @keyframes rise {
      from {
        transform: translateY(12px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .header {
      padding: 26px;
      background: linear-gradient(120deg, rgba(15, 118, 110, 0.1), rgba(79, 70, 229, 0.08));
      border-bottom: 1px solid rgba(200, 208, 220, 0.8);
    }

    .title {
      margin: 0;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      letter-spacing: 0.3px;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.97rem;
    }

    .content {
      display: grid;
      grid-template-columns: 320px 1fr;
    }

    .panel {
      padding: 24px;
      border-right: 1px solid rgba(200, 208, 220, 0.8);
      background: rgba(255, 255, 255, 0.65);
    }

    .board {
      padding: 24px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1.2rem;
    }

    .stack {
      display: grid;
      gap: 10px;
    }

    input,
    select,
    button {
      width: 100%;
      font: inherit;
      border-radius: 12px;
    }

    input,
    select {
      border: 1px solid var(--line);
      background: #fff;
      padding: 12px 13px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.18);
    }

    button {
      border: none;
      background: var(--brand);
      color: #fff;
      padding: 12px 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease;
    }

    button:hover {
      background: var(--brand-dark);
      transform: translateY(-1px);
    }

    .button-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .button-row button {
      flex: 1;
    }

    .ghost {
      background: #fff;
      border: 1px solid var(--line);
      color: var(--ink);
    }

    .ghost:hover {
      background: #f5f7fa;
      transform: translateY(-1px);
    }

    .danger {
      background: var(--danger);
    }

    .danger:hover {
      background: #912018;
    }

    .message {
      min-height: 22px;
      margin-top: 10px;
      color: var(--brand);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .error {
      color: var(--danger);
    }

    .status-card {
      margin-top: 16px;
      padding: 14px;
      border: 1px dashed var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.8);
      color: var(--muted);
      font-size: 0.92rem;
    }

    .status-card strong {
      color: var(--ink);
    }

    .hidden {
      display: none;
    }

    .task-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 16px;
    }

    .task-form button {
      width: auto;
      white-space: nowrap;
      padding-inline: 16px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .chips {
      display: flex;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--chip);
      color: var(--ink);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.88rem;
      cursor: pointer;
    }

    .chip.active {
      background: var(--brand);
      color: #fff;
      border-color: transparent;
    }

    .task-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }

    .task-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .task-title {
      margin: 0 0 6px;
      font-size: 1.02rem;
      font-weight: 700;
    }

    .task-title.done {
      text-decoration: line-through;
      color: var(--muted);
    }

    .meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    .badge.todo {
      background: var(--todo);
    }

    .badge.done {
      background: var(--done);
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .actions button {
      width: auto;
      font-size: 0.84rem;
      padding: 8px 11px;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.75);
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .content {
        grid-template-columns: 1fr;
      }

      .panel {
        border-right: none;
        border-bottom: 1px solid rgba(200, 208, 220, 0.8);
      }
    }

    @media (max-width: 640px) {
      .task-form {
        grid-template-columns: 1fr;
      }

      .task-item {
        grid-template-columns: 1fr;
      }

      .actions {
        width: 100%;
      }

      .actions button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="header">
      <h1 class="title">Task Orbit</h1>
      <p class="subtitle">Sign up, log in, create tasks, and mark them done when finished.</p>
    </header>

    <section class="content">
      <aside class="panel">
        <h2>Account</h2>
        <div class="stack">
          <input id="nameInput" type="text" placeholder="Your name (for signup)" />
          <input id="emailInput" type="email" placeholder="Email" />
          <input id="passwordInput" type="password" placeholder="Password" />
        </div>

        <div class="button-row">
          <button id="signupBtn" type="button">Sign Up</button>
          <button id="loginBtn" class="ghost" type="button">Log In</button>
        </div>

        <button id="logoutBtn" class="danger hidden" type="button" style="margin-top: 10px;">Log Out</button>
        <div id="message" class="message"></div>

        <div class="status-card">
          <div><strong>Current user:</strong> <span id="userLabel">Not logged in</span></div>
          <div style="margin-top: 8px;">Tip: Sign up once, then log in on your next visit.</div>
        </div>
      </aside>

      <main class="board">
        <h2>Your Tasks</h2>

        <form id="taskForm" class="task-form hidden">
          <input id="taskInput" type="text" placeholder="What do you need to do?" />
          <button type="submit">Add Task</button>
        </form>

        <div class="toolbar">
          <div class="chips">
            <button class="chip active" data-filter="all" type="button">All</button>
            <button class="chip" data-filter="todo" type="button">To-Do</button>
            <button class="chip" data-filter="done" type="button">Done</button>
          </div>
          <div id="countLabel" class="meta">0 tasks</div>
        </div>

        <ul id="taskList" class="task-list"></ul>
      </main>
    </section>
  </div>

  <script>
    const STORAGE_KEY = 'task-orbit-user';

    const nameInput = document.getElementById('nameInput');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const signupBtn = document.getElementById('signupBtn');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const message = document.getElementById('message');
    const userLabel = document.getElementById('userLabel');

    const taskForm = document.getElementById('taskForm');
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');
    const countLabel = document.getElementById('countLabel');
    const filterButtons = Array.from(document.querySelectorAll('[data-filter]'));

    let currentUser = null;
    let tasks = [];
    let currentFilter = 'all';

    function showMessage(text, isError) {
      message.textContent = text;
      message.classList.toggle('error', Boolean(isError));
    }

    function formatDate(value) {
      return new Date(value).toLocaleString();
    }

    function setUser(user) {
      currentUser = user;

      if (user) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(user));
        userLabel.textContent = user.name + ' (' + user.email + ')';
        logoutBtn.classList.remove('hidden');
        taskForm.classList.remove('hidden');
      } else {
        localStorage.removeItem(STORAGE_KEY);
        userLabel.textContent = 'Not logged in';
        logoutBtn.classList.add('hidden');
        taskForm.classList.add('hidden');
        tasks = [];
        renderTasks();
      }
    }

    function restoreUserFromStorage() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);

        if (!stored) {
          return;
        }

        const parsed = JSON.parse(stored);

        if (parsed && parsed._id) {
          setUser(parsed);
          loadTasks();
          showMessage('Welcome back, ' + parsed.name + '.');
        }
      } catch (error) {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function getVisibleTasks() {
      if (currentFilter === 'todo') {
        return tasks.filter((task) => !task.completed);
      }

      if (currentFilter === 'done') {
        return tasks.filter((task) => task.completed);
      }

      return tasks;
    }

    function updateCountLabel(items) {
      const todoCount = tasks.filter((task) => !task.completed).length;
      const doneCount = tasks.filter((task) => task.completed).length;
      countLabel.textContent = items.length + ' shown | ' + todoCount + ' to-do | ' + doneCount + ' done';
    }

    function createActionButton(text, className, onClick) {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = className || 'ghost';
      button.textContent = text;
      button.addEventListener('click', onClick);
      return button;
    }

    function renderTasks() {
      const visibleTasks = getVisibleTasks();
      taskList.innerHTML = '';
      updateCountLabel(visibleTasks);

      if (!currentUser) {
        taskList.innerHTML = '<li class="empty">Log in to see your tasks.</li>';
        return;
      }

      if (visibleTasks.length === 0) {
        taskList.innerHTML = '<li class="empty">No tasks in this filter yet.</li>';
        return;
      }

      visibleTasks.forEach((task) => {
        const item = document.createElement('li');
        item.className = 'task-item';

        const left = document.createElement('div');

        const badge = document.createElement('span');
        badge.className = 'badge ' + (task.completed ? 'done' : 'todo');
        badge.textContent = task.completed ? 'DONE' : 'TO-DO';

        const title = document.createElement('p');
        title.className = 'task-title' + (task.completed ? ' done' : '');
        title.textContent = task.title;

        const meta = document.createElement('p');
        meta.className = 'meta';
        const completedText = task.completedAt ? ' | completed: ' + formatDate(task.completedAt) : '';
        meta.textContent = 'created: ' + formatDate(task.createdAt) + completedText;

        left.appendChild(badge);
        left.appendChild(title);
        left.appendChild(meta);

        const actions = document.createElement('div');
        actions.className = 'actions';

        const toggleBtn = createActionButton(task.completed ? 'Undo' : 'Mark Done', 'ghost', async () => {
          await toggleTask(task._id);
        });

        const deleteBtn = createActionButton('Delete', 'danger', async () => {
          await deleteTask(task._id);
        });

        actions.appendChild(toggleBtn);
        actions.appendChild(deleteBtn);

        item.appendChild(left);
        item.appendChild(actions);
        taskList.appendChild(item);
      });
    }

    async function requestJSON(url, options) {
      const response = await fetch(url, options);
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || 'Request failed.');
      }

      return data;
    }

    async function signup() {
      const name = nameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!name || !email || !password) {
        showMessage('Name, email, and password are required for signup.', true);
        return;
      }

      try {
        const data = await requestJSON('/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });

        setUser(data.user);
        passwordInput.value = '';
        showMessage('Signup successful. You are now logged in.');
        await loadTasks();
      } catch (error) {
        showMessage(error.message, true);
      }
    }

    async function login() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        showMessage('Email and password are required for login.', true);
        return;
      }

      try {
        const data = await requestJSON('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        setUser(data.user);
        passwordInput.value = '';
        showMessage('Login successful.');
        await loadTasks();
      } catch (error) {
        showMessage(error.message, true);
      }
    }

    async function loadTasks() {
      if (!currentUser) {
        renderTasks();
        return;
      }

      try {
        tasks = await requestJSON('/tasks?userId=' + encodeURIComponent(currentUser._id));
        renderTasks();
      } catch (error) {
        showMessage(error.message, true);
      }
    }

    async function addTask(event) {
      event.preventDefault();

      const title = taskInput.value.trim();

      if (!title) {
        showMessage('Please type a task title first.', true);
        return;
      }

      if (!currentUser) {
        showMessage('Please log in first.', true);
        return;
      }

      try {
        await requestJSON('/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, userId: currentUser._id }),
        });

        taskInput.value = '';
        showMessage('Task added.');
        await loadTasks();
      } catch (error) {
        showMessage(error.message, true);
      }
    }

    async function toggleTask(taskId) {
      if (!currentUser) {
        return;
      }

      try {
        await requestJSON('/tasks/' + taskId + '/toggle', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: currentUser._id }),
        });

        showMessage('Task updated.');
        await loadTasks();
      } catch (error) {
        showMessage(error.message, true);
      }
    }

    async function deleteTask(taskId) {
      if (!currentUser) {
        return;
      }

      try {
        await requestJSON('/tasks/' + taskId, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: currentUser._id }),
        });

        showMessage('Task deleted.');
        await loadTasks();
      } catch (error) {
        showMessage(error.message, true);
      }
    }

    signupBtn.addEventListener('click', signup);
    loginBtn.addEventListener('click', login);

    logoutBtn.addEventListener('click', () => {
      setUser(null);
      showMessage('Logged out.');
    });

    taskForm.addEventListener('submit', addTask);

    filterButtons.forEach((button) => {
      button.addEventListener('click', () => {
        currentFilter = button.dataset.filter;
        filterButtons.forEach((item) => item.classList.remove('active'));
        button.classList.add('active');
        renderTasks();
      });
    });

    renderTasks();
    restoreUserFromStorage();
  </script>
</body>
</html>
